<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Minuta</title>
</head>

<body>

<h2>MINUTA DE EMBARQUE</h2>

<form onsubmit="gerarPDF(event)">

<input id="nome" placeholder="Nome" required><br><br>
<input id="cpf" placeholder="CPF/CNPJ" required><br><br>
<input id="cep" placeholder="CEP" required><br><br>
<input id="telefone" placeholder="Telefone" required><br><br>

<select id="servico">
<option>Expresso</option>
<option>Premium</option>
<option>Ecommerce</option>
</select>

<br><br>

<button type="submit">GERAR MINUTA</button>

</form>

<script>

function gerarPDF(e){
e.preventDefault();

const nome = document.getElementById("nome").value;
const cpf = document.getElementById("cpf").value;

const conteudo = `
MINUTA DE EMBARQUE

Nome: ${nome}
CPF/CNPJ: ${cpf}
`;

const blob = new Blob([conteudo], { type: "application/pdf" });
const link = document.createElement("a");

link.href = URL.createObjectURL(blob);
link.download = "minuta.pdf";
link.click();

}

</script>

</body>
</html>
