<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Minuta Azul</title>

<style>
body { font-family: Arial; background:#f5f5f5; padding:20px; }
.container { width:1000px; margin:auto; background:#fff; padding:15px; }

.topo { display:flex; justify-content:space-between; align-items:center; }
.titulo { text-align:center; font-weight:bold; flex:1; }

.barra { background:#0b2d5c; color:#fff; padding:5px; margin-top:10px; font-size:13px; }

.grid-3 { display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px; }
.grid-2 { display:grid; grid-template-columns: 1fr 1fr; gap:10px; }

input { width:100%; padding:5px; margin-top:3px; }

button {
width:100%;
padding:12px;
background:#0b2d5c;
color:#fff;
border:none;
font-weight:bold;
margin-top:15px;
cursor:pointer;
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<div class="container">

<div class="topo">
<img src="logo-azulcargo.png" style="height:60px;">
<div class="titulo">MINUTA DE DESPACHO DE CARGA</div>
<div><b>Nº DA COLETA</b><br><span id="numeroColeta" style="color:red;"></span></div>
</div>

<form onsubmit="gerarPDF(event)">

<div class="barra">DESTINATÁRIO</div>
<div class="grid-2">
<input id="nome" placeholder="Nome">
<input id="cpf" placeholder="CPF/CNPJ">
<input id="endereco" placeholder="Endereço">
<input id="cidade" placeholder="Cidade">
<input id="cep" placeholder="CEP">
<input id="telefone" placeholder="Telefone">
</div>

<div class="barra">INFORMAÇÕES DA CARGA</div>
<div class="grid-2">
<input id="volumes" placeholder="Volumes">
<input id="peso" placeholder="Peso (kg)">
</div>

<div class="barra">DECLARAÇÃO</div>
<div style="border:1px solid #000; padding:10px; font-size:11px; text-align:justify;">
Autorizo a emissão do conhecimento aéreo e o transporte do(s) volume(s) conforme especificações acima neste documento...
</div>

<button type="submit">GERAR MINUTA</button>

</form>

</div>

<script>

// NUMERO
function gerarNumeroColeta(){
const d=new Date();
return d.getFullYear()+""+(d.getMonth()+1)+""+d.getDate()+""+d.getHours()+""+d.getMinutes()+""+Math.floor(Math.random()*100);
}
document.getElementById("numeroColeta").innerText=gerarNumeroColeta();

// MASCARAS
document.addEventListener("focusout",function(e){
let v=e.target.value.replace(/\D/g,'');

if(e.target.id=="cpf"){
if(v.length==11)e.target.value=v.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/,'$1.$2.$3-$4');
if(v.length==14)e.target.value=v.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/,'$1.$2.$3/$4-$5');
}
if(e.target.id=="cep"){
e.target.value=v.replace(/(\d{5})(\d{3})/,'$1-$2');
}
if(e.target.id=="telefone"){
if(v.length==11)e.target.value=v.replace(/(\d{2})(\d{5})(\d{4})/,'($1) $2-$3');
}
});

// PDF
function gerarPDF(e){
e.preventDefault();

const { jsPDF } = window.jspdf;
const doc = new jsPDF();

let numero=document.getElementById("numeroColeta").innerText;
let nome=document.getElementById("nome").value;
let cpf=document.getElementById("cpf").value;
let tel=document.getElementById("telefone").value;
let cidade=document.getElementById("cidade").value;
let cep=document.getElementById("cep").value;
let volumes=document.getElementById("volumes").value;
let peso=document.getElementById("peso").value;

// LOGO
const img=new Image();
img.src="logo-azulcargo.png";

img.onload=function(){

// CABEÇALHO
doc.addImage(img,'PNG',10,5,50,20);
doc.setFontSize(12);
doc.text("MINUTA DE DESPACHO DE CARGA",105,15,null,null,"center");

doc.setTextColor(255,0,0);
doc.text(numero,160,15);
doc.setTextColor(0,0,0);

// CAIXA DESTINATARIO
doc.rect(10,30,190,40);
doc.text("DESTINATÁRIO",12,35);
doc.text("Nome: "+nome,12,45);
doc.text("CPF/CNPJ: "+cpf,12,55);
doc.text("Telefone: "+tel,110,55);
doc.text("Cidade: "+cidade,12,65);
doc.text("CEP: "+cep,110,65);

// CARGA
doc.rect(10,75,190,25);
doc.text("INFORMAÇÕES DA CARGA",12,80);
doc.text("Volumes: "+volumes,12,90);
doc.text("Peso: "+peso+" kg",110,90);

// NOVA PAGINA (DECLARAÇÃO)
doc.addPage();

doc.setFontSize(9);
doc.text(`Autorizo a emissão do conhecimento aéreo e o transporte do(s) volume(s) conforme especificações acima neste documento, responsabilizando-me por eventuais atrasos ou prejuizos decorrentes de informações incorretas ou incompletas nesta minuta.

Declaro que: O(s) volume(s) foi(foram) submetido(s) a controles de segurança apropriados até o momento da entrega à Azul Linhas Aereas Brasileiras S.A...

Afirmo que NÃO CONTEM itens proibidos para transporte pela Azul.`,10,20,{maxWidth:190});

doc.save("minuta.pdf");
}
}

</script>

</body>
</html>
