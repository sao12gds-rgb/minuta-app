<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Minuta de Embarque</title>
</head>
<body>

<h2>MINUTA DE EMBARQUE</h2>

<form action="/gerar" method="POST">

<h3>Tipo de Serviço</h3>
<select name="servico" required>
  <option value="">Selecione</option>
  <option>Expresso</option>
  <option>Premium</option>
  <option>Ecommerce</option>
</select>

<h3>Destinatário</h3>
<input name="nome" placeholder="Nome" required><br>
<input name="cpf" placeholder="CPF/CNPJ" required><br>
<input name="endereco" placeholder="Endereço" required><br>
<input name="cep" placeholder="CEP" required><br>
<input name="telefone" placeholder="Telefone" required><br>

<h3>Carga</h3>
<input name="volumes" placeholder="Volumes" required><br>
<input name="peso" placeholder="Peso (kg)" required><br>

<br>
<button type="submit">GERAR MINUTA</button>

</form>

</body>
</html>
